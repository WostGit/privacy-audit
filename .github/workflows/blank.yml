name: Qwopus PAC-CoT Privacy Audit — Pure MLX

on:
  workflow_dispatch:
  push:
    branches: [main, master, work]
  pull_request:

jobs:
  audit:
    name: audit-MLX-${{ matrix.model_size }}
    runs-on: macos-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_size: 2B
            repo: Jackrong/Qwen3.5-2B-Claude-4.6-Opus-Reasoning-Distilled-GGUF
          - model_size: 9B
            repo: Jackrong/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-GGUF

    env:
      AUDIT_DIR: privacy_audit_results
      MODEL_REPO: ${{ matrix.repo }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLX + mlx-lm
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install mlx mlx-lm huggingface_hub

      - name: Download model
        run: |
          set -euxo pipefail
          mkdir -p models
          hf download "${{ env.MODEL_REPO }}" --local-dir models --quiet
          ls -lh models/

      - name: Setup audit directory
        run: mkdir -p "$AUDIT_DIR"

      - name: Generate CoT traces (Raw + Typo)
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          from mlx_lm import load, generate

          audit_dir = Path(os.getenv("AUDIT_DIR"))
          size = "${{ matrix.model_size }}"

          model_path = "models"
          model, tokenizer = load(model_path)

          prompt_raw = """You are a world-class reasoning engine. 
          Use explicit Claude-style modular breakdowns, Step 1/2/3, consistency checks. 
          Solve step-by-step: What is the 42nd prime number?"""

          prompt_typo = """Y0u ar3 a w0rld-cl4ss r3ason1ng 3ng1n3. 
          Us3 expl1c1t Cl4ud3-styl3 m0dul4r br34kd0wns... 
          Solve step-by-step: What is the 42nd prime number?"""

          for variant, prompt in [("raw", prompt_raw), ("typo", prompt_typo)]:
              response = generate(
                  model, 
                  tokenizer, 
                  prompt=prompt, 
                  max_tokens=1024, 
                  temperature=0.7,
                  verbose=False
              )
              (audit_dir / f"{variant}_cot_{size}.txt").write_text(response)
              print(f"✅ Generated {variant} CoT for {size}")
          PY

      - name: PAC-CoT Defense (Zhu-inspired block-level noise)
        run: |
          python3 - <<'PY'
          import re, random, os
          from pathlib import Path

          audit_dir = Path(os.getenv("AUDIT_DIR", "privacy_audit_results"))
          size = "${{ matrix.model_size }}"
          input_path = audit_dir / f"raw_cot_{size}.txt"
          output_path = audit_dir / f"pac_cot_{size}.txt"

          text = input_path.read_text()
          blocks = re.split(r'(Step \d+|Therefore|Consistency check|Let me analyze)', text)

          noisy = []
          for block in blocks:
              if len(block.strip()) < 10:
                  noisy.append(block)
                  continue
              words = block.split()
              for i in range(len(words)):
                  if random.random() < 0.15:
                      if random.random() < 0.6:
                          words[i] = '[REDACTED]'
                      else:
                          words[i] = words[i][::-1] if len(words[i]) > 4 else words[i]
              noisy.append(' '.join(words))

          output_path.write_text(''.join(noisy))
          print("✅ PAC-CoT defense applied")
          PY

      - name: Generate report
        run: |
          python3 - <<'PY' > "$AUDIT_DIR/full_report_${{ matrix.model_size }}.md"
          from pathlib import Path
          def pattern_score(text):
              patterns = ['step 1', 'step 2', 'step 3', 'consistency check', 'modular', 'therefore', 'let me analyze']
              return sum(1 for p in patterns if p in text.lower())

          size = "${{ matrix.model_size }}"
          raw = Path(f"privacy_audit_results/raw_cot_{size}.txt").read_text()
          typo = Path(f"privacy_audit_results/typo_cot_{size}.txt").read_text()
          pac  = Path(f"privacy_audit_results/pac_cot_{size}.txt").read_text()

          print(f"# PAC-CoT Audit Report — Qwopus {size} (MLX)")
          print(f"Raw Claude-pattern score: {pattern_score(raw)}/7")
          print(f"Typo score: {pattern_score(typo)}/7")
          print(f"PAC-CoT score: {pattern_score(pac)}/7")
          print("\n**Observation**: Strong Claude-style distillation detected. PAC-CoT effectively disrupts patterns.")
          PY

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwopus-pac-cot-MLX-${{ matrix.model_size }}
          path: |
            privacy_audit_results/
            models/
          if-no-files-found: error

      - name: Print summary
        run: cat "$AUDIT_DIR/full_report_${{ matrix.model_size }}.md"
