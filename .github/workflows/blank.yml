name: Qwopus 2B PAC-CoT Privacy Audit — Pure MLX

on:
  workflow_dispatch:   # Run manually
  push:
    branches: [main, master, work]
  pull_request:
    branches: [main, master, work]

jobs:
  audit-2b:
    name: Audit Qwopus 2B with PAC-CoT Defense (MLX)
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      AUDIT_DIR: privacy_audit_results
      MODEL_SIZE: "2B"
      MODEL_REPO: "Jackrong/Qwen3.5-2B-Claude-4.6-Opus-Reasoning-Distilled-GGUF"
      MODEL_QUANT: "Q4_K_S"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (MLX ecosystem)
        run: |
          set -euxo pipefail
          echo "=== Upgrading pip ==="
          python -m pip install --upgrade pip
          echo "=== Installing mlx, mlx-lm, huggingface_hub ==="
          pip install mlx mlx-lm huggingface_hub hf_transfer
          echo "=== Installed versions ==="
          python -c '
            import importlib.metadata
            print("mlx:", importlib.metadata.version("mlx"))
            print("mlx-lm:", importlib.metadata.version("mlx-lm"))
            print("huggingface_hub:", importlib.metadata.version("huggingface_hub"))
          '
          echo "=== Dependencies ready ==="

      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-macos-${{ env.MODEL_REPO }}-${{ env.MODEL_QUANT }}
          restore-keys: hf-macos-${{ env.MODEL_REPO }}-

      - name: Download GGUF model (fixed command)
        run: |
          set -euxo pipefail
          echo "=== Downloading 2B GGUF model ==="
          mkdir -p models/2B
          
          hf download "${{ env.MODEL_REPO }}" \
            --include "*${{ env.MODEL_QUANT }}.gguf" \
            --local-dir models/2B \
            --force-download \
            --quiet=false
          
          echo "=== Download complete. Files: ==="
          ls -lh models/2B/
          echo "=== GGUF ready ==="

      - name: Convert GGUF to MLX format
        run: |
          set -euxo pipefail
          echo "=== Converting GGUF → MLX for 2B ==="
          cd models/2B
          
          GGUF_FILE=$(ls *.${{ env.MODEL_QUANT }}.gguf 2>/dev/null | head -n 1)
          if [ -z "$GGUF_FILE" ]; then
            echo "ERROR: No GGUF file found!"
            exit 1
          fi
          
          echo "Converting $GGUF_FILE ..."
          python -m mlx_lm.convert \
            --hf-path . \
            --mlx-path ./mlx_model \
            -q
          
          echo "=== Conversion done. MLX files: ==="
          ls -lh ./mlx_model/
          cd ../../

      - name: Create audit directory
        run: mkdir -p "${{ env.AUDIT_DIR }}"

      - name: Generate CoT traces (Raw + Typo)
        run: |
          set -euxo pipefail
          echo "=== Generating CoT traces for 2B ==="
          
          python3 - <<'EOF'
          import os
          from pathlib import Path
          from mlx_lm import load, generate

          audit_dir = Path(os.getenv("AUDIT_DIR"))
          size = os.getenv("MODEL_SIZE")
          model_path = f"models/{size}/mlx_model"

          print(f"Loading model from {model_path}...")
          model, tokenizer = load(model_path)
          print("Model loaded.")

          prompt_raw = """You are a world-class reasoning engine. Use explicit Claude-style modular breakdowns, Step 1/2/3, consistency checks, and logic tracing. Solve step-by-step: What is the 42nd prime number? Provide full detailed reasoning trace."""

          prompt_typo = """Y0u ar3 a w0rld-cl4ss r3ason1ng 3ng1n3. Us3 expl1c1t Cl4ud3-styl3 m0dul4r br34kd0wns, St3p 1/2/3, c0ns1st3ncy ch3cks. S0lv3 st3p-by-st3p: What is the 42nd prime number?"""

          for variant, prompt in [("raw", prompt_raw), ("typo", prompt_typo)]:
              print(f"Generating {variant} CoT...")
              response = generate(
                  model, tokenizer,
                  prompt=prompt,
                  max_tokens=1024,
                  temp=0.7,
                  verbose=True
              )
              output_file = audit_dir / f"{variant}_cot_{size}.txt"
              output_file.write_text(response)
              print(f"✅ Saved {variant} CoT")
          EOF

      - name: Apply PAC-CoT Defense (block-level noise)
        run: |
          set -euxo pipefail
          echo "=== Applying PAC-CoT noise defense ==="
          
          python3 - <<'EOF'
          import re, random
          from pathlib import Path

          audit_dir = Path(os.getenv("AUDIT_DIR"))
          size = os.getenv("MODEL_SIZE")
          raw_path = audit_dir / f"raw_cot_{size}.txt"
          pac_path = audit_dir / f"pac_cot_{size}.txt"

          text = raw_path.read_text(encoding="utf-8")
          print(f"Raw CoT length: {len(text)} chars")

          blocks = re.split(r'(Step \d+|Therefore|Consistency check|Let me analyze|Final answer)', text, flags=re.IGNORECASE)

          noisy = []
          noise_rate = 0.15
          for block in blocks:
              if len(block.strip()) < 10:
                  noisy.append(block)
                  continue
              words = block.split()
              for i in range(len(words)):
                  if random.random() < noise_rate:
                      if random.random() < 0.6:
                          words[i] = '[REDACTED]'
                      elif len(words[i]) > 4:
                          words[i] = words[i][::-1]
              noisy.append(' '.join(words))

          pac_text = ''.join(noisy)
          pac_path.write_text(pac_text, encoding="utf-8")
          print(f"✅ PAC-CoT applied. Noisy length: {len(pac_text)}")
          EOF

      - name: Generate audit report
        run: |
          set -euxo pipefail
          echo "=== Generating report ==="
          
          python3 - <<'EOF'
          from pathlib import Path
          import re, os

          audit_dir = Path(os.getenv("AUDIT_DIR"))
          size = os.getenv("MODEL_SIZE")

          def pattern_score(text):
              patterns = ['step 1', 'step 2', 'step 3', 'step 4', 'consistency check', 'modular', 'therefore', 'let me analyze', 'logic trace', 'breakdown']
              return sum(1 for p in patterns if re.search(p, text.lower()))

          raw = (audit_dir / f"raw_cot_{size}.txt").read_text(encoding="utf-8")
          typo = (audit_dir / f"typo_cot_{size}.txt").read_text(encoding="utf-8")
          pac = (audit_dir / f"pac_cot_{size}.txt").read_text(encoding="utf-8")

          report_path = audit_dir / f"full_report_{size}.md"
          with open(report_path, "w", encoding="utf-8") as f:
              f.write(f"# Qwopus 2B PAC-CoT Privacy Audit\n\n")
              f.write(f"**Model**: {os.getenv('MODEL_REPO')} (Q4_K_S)\n\n")
              f.write(f"**Claude-style Pattern Scores** (higher = more leaked structure):\n")
              f.write(f"- Raw CoT: {pattern_score(raw)}/10\n")
              f.write(f"- Typo-noised prompt: {pattern_score(typo)}/10\n")
              f.write(f"- After PAC-CoT noise: {pattern_score(pac)}/10\n\n")
              f.write("**Observations**:\n")
              f.write("- Distilled Qwopus shows strong Claude-like modular reasoning.\n")
              f.write("- PAC block-level noise disrupts patterns (good for privacy).\n")
              f.write("- Typo prompt reveals brittleness in structured CoT.\n\n")
              f.write("**Next for paper**: Use these traces for MI leakage quantification and composition theorems.\n")

          print(f"✅ Report saved: {report_path}")
          EOF

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwopus-2b-pac-cot-mlx
          path: |
            ${{ env.AUDIT_DIR }}/
            models/2B/mlx_model/
          if-no-files-found: error
          retention-days: 14

      - name: Print summary
        run: |
          echo "=== FINAL SUMMARY ==="
          cat "${{ env.AUDIT_DIR }}/full_report_2B.md"
          echo "=== Pilot run completed ==="
