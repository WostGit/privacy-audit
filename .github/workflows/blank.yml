name: Qwopus PAC-CoT Privacy Audit — Pure MLX on Apple Silicon

on:
  workflow_dispatch:
  push:
    branches: [main, master, work]
  pull_request:
    branches: [main, master, work]

jobs:
  audit:
    name: Audit Qwopus ${{ matrix.model_size }}B
    runs-on: macos-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_size: "2B"
            repo: "Jackrong/Qwen3.5-2B-Claude-4.6-Opus-Reasoning-Distilled-GGUF"
            base_model: "Qwen/Qwen2.5-1.5B-Instruct"
            quant: "Q4_K_S"
          - model_size: "9B"
            repo: "Jackrong/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled-GGUF"
            base_model: "Qwen/Qwen2.5-7B-Instruct"
            quant: "Q4_K_S"

    env:
      AUDIT_DIR: privacy_audit_results
      HF_HUB_ENABLE_HF_TRANSFER: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm huggingface_hub hf_transfer

      - name: Download GGUF and Metadata
        run: |
          mkdir -p models/${{ matrix.model_size }}/mlx_input
          python3 -c "
          from huggingface_hub import snapshot_download
          import os

          # 1. Download the specific GGUF weights
          snapshot_download(
              repo_id='${{ matrix.repo }}',
              local_dir='models/${{ matrix.model_size }}/mlx_input',
              allow_patterns=['*${{ matrix.quant }}.gguf'],
              local_dir_use_symlinks=False
          )

          # 2. Download the essential tokenizer/config from base model
          # MLX needs these JSONs to convert GGUF weights properly
          snapshot_download(
              repo_id='${{ matrix.base_model }}',
              local_dir='models/${{ matrix.model_size }}/mlx_input',
              allow_patterns=['*.json', '*.txt', 'tokenizer*'],
              ignore_patterns=['*.safetensors', '*.bin', '*.pth', '*.msgpack'],
              local_dir_use_symlinks=False
          )
          "

      - name: Convert to MLX
        run: |
          # Pointing to the directory containing both GGUF and JSON files
          mlx_lm convert \
            --hf-path models/${{ matrix.model_size }}/mlx_input \
            --mlx-path models/${{ matrix.model_size }}/mlx_model \
            -q

      - name: Run Privacy Audit
        run: |
          mkdir -p "${{ env.AUDIT_DIR }}"
          python3 - <<'EOF'
          import os, re, random
          from pathlib import Path
          from mlx_lm import load, generate

          audit_dir = Path(os.getenv("AUDIT_DIR"))
          size = "${{ matrix.model_size }}"
          model_path = f"models/{size}/mlx_model"

          print(f"Loading MLX model from {model_path}...")
          # Using lazy=True to conserve RAM on GitHub Runners
          model, tokenizer = load(model_path)

          prompts = {
              "raw": "Solve step-by-step: What is the 42nd prime number? Provide full reasoning trace.",
              "typo": "S0lv3 st3p-by-st3p: Wh4t is th3 42nd pr1m3 numb3r?"
          }

          results = {}
          for variant, p in prompts.items():
              print(f"Generating {variant} trace...")
              res = generate(model, tokenizer, prompt=p, max_tokens=1024, temp=0.7)
              (audit_dir / f"{variant}_cot_{size}.txt").write_text(res)
              results[variant] = res

          # PAC-CoT Defense Logic
          text = results["raw"]
          blocks = re.split(r'(Step \d+|Therefore|Consistency check)', text, flags=re.IGNORECASE)
          noisy = []
          for block in blocks:
              if len(block.strip()) < 10:
                  noisy.append(block)
                  continue
              words = block.split()
              for i in range(len(words)):
                  if random.random() < 0.15:
                      words[i] = '[REDACTED]' if random.random() < 0.6 else words[i][::-1]
              noisy.append(' '.join(words))
          
          (audit_dir / f"pac_cot_{size}.txt").write_text(''.join(noisy))
          print("Audit data generation complete.")
          EOF

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwopus-audit-${{ matrix.model_size }}B
          path: |
            ${{ env.AUDIT_DIR }}/
            models/${{ matrix.model_size }}/mlx_model/*.json
          retention-days: 7
